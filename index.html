<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羽球指揮官 PRO-2026</title>
    <style>
        :root {
            --neon-green: #d1ff00; /* 螢光羽球色 */
            --neon-blue: #00f2ff;
            --glass-bg: rgba(6, 15, 25, 0.82);
            --blue: #3498db; --yellow: #f1c40f; --orange: #e67e22; --red: #e74c3c;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'PingFang TC', 'Heiti TC', sans-serif;
            color: #ffffff;
            /* 背景圖：專業羽球場視角 */
            background: url('https://images.unsplash.com/photo-1521537634581-0dced2fee2ef?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 暗色覆蓋層，提升文字對比度 */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(10,25,40,0.8) 100%);
            z-index: -1;
        }

        .container { width: 95%; max-width: 950px; padding: 20px; box-sizing: border-box; }

        h2 {
            font-size: 2.2rem; letter-spacing: 5px;
            text-align: center; color: var(--neon-green);
            text-shadow: 0 0 20px rgba(209, 255, 0, 0.5);
            margin: 20px 0;
        }

        /* 頂級玻璃擬態效果 */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .court-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        
        /* 場地框：模擬 LED 記分板感 */
        .court-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1.5px solid var(--neon-blue);
            padding: 20px; border-radius: 15px;
            text-align: center; position: relative;
            overflow: hidden;
        }
        .court-box::after {
            content: "COURT"; position: absolute; top: -5px; right: 5px;
            font-size: 40px; color: rgba(0, 242, 255, 0.05); font-weight: 900;
        }

        .player-tag {
            display: inline-block; padding: 10px; width: 110px;
            background: rgba(255, 255, 255, 0.08);
            margin: 5px; border-radius: 6px; font-weight: bold;
            font-size: 16px; border-left: 4px solid transparent;
        }
        .lvl-1 { border-left-color: var(--blue); color: var(--blue); }
        .lvl-2 { border-left-color: var(--yellow); color: var(--yellow); }
        .lvl-3 { border-left-color: var(--orange); color: var(--orange); }
        .lvl-4 { border-left-color: var(--red); color: var(--red); }

        button {
            background: linear-gradient(135deg, #00f2ff, #0066ff);
            color: white; border: none; padding: 14px 25px;
            border-radius: 10px; cursor: pointer; font-weight: bold;
            transition: 0.3s; letter-spacing: 1px;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(0, 242, 255, 0.4); }

        .btn-main {
            background: linear-gradient(135deg, var(--neon-green), #88b500);
            color: #000; width: 100%; font-size: 1.2rem; margin-top: 10px;
        }

        textarea {
            width: 100%; background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 15px; border-radius: 12px;
            font-size: 15px; outline: none; box-sizing: border-box;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { color: var(--neon-blue); padding: 12px; border-bottom: 2px solid rgba(0, 242, 255, 0.3); }
        td { padding: 15px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        .hidden { display: none !important; }
        .neon-text { color: var(--neon-green); text-shadow: 0 0 5px var(--neon-green); }
    </style>
</head>
<body>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px;">
            <h2>🏸 羽球賽事後台</h2>
            <button onclick="togglePrivacy()" style="background: rgba(255,255,255,0.1); font-size: 11px; padding: 5px 10px;">🛡️ 隱身模式</button>
        </div>

        <div id="countDisplay" class="neon-text" style="text-align: center; margin-bottom: 20px; font-weight: bold; letter-spacing: 1px;">
            [ SYSTEM ACTIVE: 載入球員 0 位 ]
        </div>

        <div class="card" id="adminSection">
            <div style="font-weight: bold; margin-bottom: 10px;">📥 快速建檔 (格式: 姓名-編號, 顏色)</div>
            <textarea id="batchInput" placeholder="阿強-1,紅&#10;阿珍-1,紅&#10;小明,藍"></textarea>
            <button onclick="processBatch()" style="width:100%; margin-top:10px;">確認數據導入</button>
        </div>

        <div class="card">
            <button class="btn-main" onclick="generateMatch()">🔥 啟動智能配對</button>
            <div id="courtDisplay" class="court-grid" style="margin-top:25px;"></div>
        </div>

        <div class="card" id="rankSection">
            <div style="font-weight: bold; margin-bottom: 10px; color: var(--neon-blue);">📊 球員數據分析</div>
            <div id="rankTableWrapper">
                <table>
                    <thead>
                        <tr><th>選手</th><th>等級</th><th>場數</th><th>勝場</th><th>操作</th></tr>
                    </thead>
                    <tbody id="rankingBody"></tbody>
                </table>
            </div>
            <button onclick="clearData()" style="background: transparent; color: #555; margin-top: 20px; font-size: 10px; border: 1px solid #333;">重置系統數據</button>
        </div>
    </div>

    <script>
        let players = JSON.parse(localStorage.getItem('badminton_final_tech_data')) || [];
        const lvlMap = { "藍": 1, "黃": 2, "橘": 3, "紅": 4, "1": 1, "2": 2, "3": 3, "4": 4 };
        const lvlNames = { 1: "藍 (初級)", 2: "黃 (中級)", 3: "橘 (高級)", 4: "紅 (專業)" };

        window.onload = render;

        function togglePrivacy() {
            document.getElementById('rankTableWrapper').classList.toggle('hidden');
            document.getElementById('adminSection').classList.toggle('hidden');
        }

        function processBatch() {
            const text = document.getElementById('batchInput').value.trim();
            if (!text) return;
            text.split('\n').forEach(line => {
                const parts = line.split(/[,，]/);
                if (parts.length >= 2) {
                    let rawName = parts[0].trim();
                    let pairId = rawName.includes('-') ? rawName.split('-')[1] : null;
                    let cleanName = rawName.split('-')[0];
                    let lvl = lvlMap[parts[1].trim()[0]] || 1;
                    if (!players.find(p => p.name === cleanName)) {
                        players.push({ name: cleanName, level: lvl, playCount: 0, wins: 0, pairId: pairId });
                    }
                }
            });
            saveAndRender();
            document.getElementById('batchInput').value = "";
        }

        function generateMatch() {
            if (players.length < 4) return alert("人數不足以開啟 4 面場配對！");
            let pool = [...players].sort((a,b) => a.playCount - b.playCount);
            let selectedPool = [];
            let usedNames = new Set();

            for (let p of pool) {
                if (selectedPool.length >= 16) break;
                if (usedNames.has(p.name)) continue;
                if (p.pairId) {
                    let partner = players.find(x => x.pairId === p.pairId && x.name !== p.name);
                    if (partner && !usedNames.has(partner.name) && selectedPool.length <= 14) {
                        selectedPool.push(p, partner);
                        usedNames.add(p.name); usedNames.add(partner.name);
                    } else if (!partner) { selectedPool.push(p); usedNames.add(p.name); }
                } else { selectedPool.push(p); usedNames.add(p.name); }
            }

            selectedPool.sort((a, b) => a.level - b.level);
            const display = document.getElementById('courtDisplay');
            display.innerHTML = "";

            for (let i = 0; i < 4; i++) {
                let match = selectedPool.slice(i * 4, (i * 4) + 4);
                if (match.length === 4) {
                    match.sort((a, b) => (a.pairId && b.pairId && a.pairId === b.pairId) ? 0 : (a.pairId ? -1 : 1));
                    match.forEach(p => players.find(x => x.name === p.name).playCount++);
                    display.innerHTML += `
                        <div class="court-box">
                            <div style="color: var(--neon-blue); font-size: 14px; margin-bottom:15px; font-weight:bold;">第 ${i+1} 場地</div>
                            <div class="player-tag lvl-${match[0].level}">${match[0].name}${match[0].pairId?'🔗':''}</div>
                            <div class="player-tag lvl-${match[1].level}">${match[1].name}${match[1].pairId?'🔗':''}</div>
                            <div style="color: #444; margin: 10px 0; font-size: 12px;">⚔️</div>
                            <div class="player-tag lvl-${match[2].level}">${match[2].name}${match[2].pairId?'🔗':''}</div>
                            <div class="player-tag lvl-${match[3].level}">${match[3].name}${match[3].pairId?'🔗':''}</div>
                        </div>`;
                }
            }
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('badminton_final_tech_data', JSON.stringify(players));
            render();
        }

        function render() {
            document.getElementById('countDisplay').innerText = `[ SYSTEM ACTIVE: 載入球員 ${players.length} 位 ]`;
            const body = document.getElementById('rankingBody');
            let sorted = [...players].sort((a, b) => b.level - a.level || b.wins - a.wins);
            body.innerHTML = sorted.map(p => `
                <tr>
                    <td style="font-weight:bold;">${p.name}${p.pairId?'🔗':''}</td>
                    <td class="lvl-${p.level}">${lvlNames[p.level]}</td>
                    <td>${p.playCount}</td>
                    <td class="neon-text" style="font-size:1.1rem;">${p.wins}</td>
                    <td><button onclick="addWin('${p.name}')" style="padding: 5px 12px; font-size:11px;">+勝場</button></td>
                </tr>`).join('');
        }

        function addWin(n) { players.find(p => p.name === n).wins++; saveAndRender(); }
        function clearData() { if(confirm("確定要重置所有數據嗎？")) { players = []; saveAndRender(); } }
    </script>
</body>
</html>
