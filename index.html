<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>羽球指揮官 PRO-2026</title>
    <style>
        :root {
            --neon-green: #d1ff00;
            --neon-blue: #00f2ff;
            --glass-bg: rgba(6, 15, 25, 0.88);
            --blue: #3498db; --yellow: #f1c40f; --orange: #e67e22; --red: #e74c3c;
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang TC", sans-serif;
            color: #ffffff;
            background: url('https://images.unsplash.com/photo-1521537634581-0dced2fee2ef?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(10,25,40,0.92) 100%);
            z-index: -1;
        }

        /* 頂部即時行情 */
        .market-ticker {
            width: 100%; background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--neon-blue);
            padding: 8px 0; text-align: center; font-size: 12px;
            font-weight: bold; color: var(--neon-blue); position: sticky; top: 0; z-index: 1000;
        }

        .container { width: 100%; max-width: 600px; padding: 12px; box-sizing: border-box; }

        h2 {
            font-size: 1.6rem; letter-spacing: 3px;
            text-align: center; color: var(--neon-green);
            text-shadow: 0 0 15px rgba(209, 255, 0, 0.5);
            margin: 15px 0;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 15px;
            margin-bottom: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        /* 響應式網格：手機 1 欄，平板以上 2 欄 */
        .court-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 12px; 
        }
        @media (min-width: 480px) { .court-grid { grid-template-columns: 1fr 1fr; } }

        .court-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--neon-blue);
            padding: 12px; border-radius: 12px;
            text-align: center; position: relative;
        }

        .player-row { display: flex; justify-content: space-around; margin: 5px 0; }

        .player-tag {
            width: 44%; padding: 10px 2px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px; font-weight: bold;
            font-size: 14px; border-left: 4px solid transparent;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .lvl-1 { border-left-color: var(--blue); color: #fff; }
        .lvl-2 { border-left-color: var(--yellow); color: #fff; }
        .lvl-3 { border-left-color: var(--orange); color: #fff; }
        .lvl-4 { border-left-color: var(--red); color: #fff; }

        button {
            background: linear-gradient(135deg, #00f2ff, #0066ff);
            color: white; border: none; padding: 12px;
            border-radius: 10px; cursor: pointer; font-weight: bold;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-main {
            background: linear-gradient(135deg, var(--neon-green), #88b500);
            color: #000; width: 100%; font-size: 1.1rem; margin: 10px 0;
            padding: 16px; border-radius: 12px;
        }

        textarea {
            width: 100%; background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 12px; border-radius: 10px;
            font-size: 16px; box-sizing: border-box; outline: none;
        }

        /* 表格容器滾動保護 */
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th { color: var(--neon-blue); padding: 10px; border-bottom: 2px solid rgba(0, 242, 255, 0.2); font-size: 13px; }
        td { padding: 12px 5px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: 14px; }

        .hidden { display: none !important; }
        .neon-text { color: var(--neon-green); }
    </style>
</head>
<body>

    <div class="market-ticker">
        💎 ETH: $2,061 USD | 策略建議: DCA 定期定額分批 📈
    </div>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>🏸 羽球賽事後台</h2>
            <button onclick="togglePrivacy()" style="background: rgba(255,255,255,0.1); font-size: 11px; padding: 6px 10px; border: 1px solid #444;">🛡️ 隱藏</button>
        </div>

        <div id="countDisplay" class="neon-text" style="text-align: center; margin-bottom: 15px; font-weight: bold; font-size: 13px;">
            [ SYSTEM ACTIVE: 載入 0 位 ]
        </div>

        <div class="card" id="adminSection">
            <div style="font-weight: bold; margin-bottom: 8px; font-size: 14px;">📥 快速建檔 (姓名-編號, 顏色)</div>
            <textarea id="batchInput" rows="3" placeholder="阿強-1,紅"></textarea>
            <button onclick="processBatch()" style="width:100%; margin-top:10px;">確認數據導入</button>
        </div>

        <div class="card">
            <button class="btn-main" onclick="generateMatch()">🔥 啟動智能配對</button>
            <div id="courtDisplay" class="court-grid" style="margin-top:15px;"></div>
        </div>

        <div class="card" id="rankSection">
            <div style="font-weight: bold; margin-bottom: 10px; color: var(--neon-blue); font-size: 15px;">📊 球員數據分析</div>
            <div id="rankTableWrapper" class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>選手</th><th>等級</th><th>場數</th><th>勝場</th><th>操作</th></tr>
                    </thead>
                    <tbody id="rankingBody"></tbody>
                </table>
            </div>
            <button onclick="clearData()" style="background: transparent; color: #666; margin-top: 25px; font-size: 10px; border: 1px solid #333; width: 100%;">重置系統數據</button>
        </div>
    </div>

    <script>
        // 優先讀取舊版資料，若無則初始化
        let players = JSON.parse(localStorage.getItem('badminton_final_tech_data')) || [];
        const lvlMap = { "藍": 1, "黃": 2, "橘": 3, "紅": 4, "1": 1, "2": 2, "3": 3, "4": 4 };
        const lvlNames = { 1: "藍", 2: "黃", 3: "橘", 4: "紅" };

        window.onload = render;

        function togglePrivacy() {
            document.getElementById('rankTableWrapper').classList.toggle('hidden');
            document.getElementById('adminSection').classList.toggle('hidden');
        }

        function processBatch() {
            const text = document.getElementById('batchInput').value.trim();
            if (!text) return;
            text.split('\n').forEach(line => {
                const parts = line.split(/[,，]/);
                if (parts.length >= 2) {
                    let rawName = parts[0].trim();
                    let pairId = rawName.includes('-') ? rawName.split('-')[1] : null;
                    let cleanName = rawName.split('-')[0];
                    let lvl = lvlMap[parts[1].trim()[0]] || 1;
                    if (!players.find(p => p.name === cleanName)) {
                        players.push({ name: cleanName, level: lvl, playCount: 0, wins: 0, pairId: pairId });
                    }
                }
            });
            saveAndRender();
            document.getElementById('batchInput').value = "";
        }

        function generateMatch() {
            if (players.length < 4) return alert("人數不足以配對！");
            let pool = [...players].sort((a,b) => a.playCount - b.playCount);
            let selectedPool = [];
            let usedNames = new Set();

            for (let p of pool) {
                if (selectedPool.length >= 16) break;
                if (usedNames.has(p.name)) continue;
                if (p.pairId) {
                    let partner = players.find(x => x.pairId === p.pairId && x.name !== p.name);
                    if (partner && !usedNames.has(partner.name) && selectedPool.length <= 14) {
                        selectedPool.push(p, partner);
                        usedNames.add(p.name); usedNames.add(partner.name);
                    } else if (!partner) { selectedPool.push(p); usedNames.add(p.name); }
                } else { selectedPool.push(p); usedNames.add(p.name); }
            }

            selectedPool.sort((a, b) => a.level - b.level);
            const display = document.getElementById('courtDisplay');
            display.innerHTML = "";

            for (let i = 0; i < 4; i++) {
                let match = selectedPool.slice(i * 4, (i * 4) + 4);
                if (match.length === 4) {
                    match.forEach(p => players.find(x => x.name === p.name).playCount++);
                    display.innerHTML += `
                        <div class="court-box">
                            <div style="color: var(--neon-blue); font-size: 12px; margin-bottom:10px; font-weight:bold;">COURT ${i+1}</div>
                            <div class="player-row">
                                <div class="player-tag lvl-${match[0].level}">${match[0].name}${match[0].pairId?'🔗':''}</div>
                                <div class="player-tag lvl-${match[1].level}">${match[1].name}${match[1].pairId?'🔗':''}</div>
                            </div>
                            <div style="color: #555; margin: 4px 0; font-size: 10px;">VS</div>
                            <div class="player-row">
                                <div class="player-tag lvl-${match[2].level}">${match[2].name}${match[2].pairId?'🔗':''}</div>
                                <div class="player-tag lvl-${match[3].level}">${match[3].name}${match[3].pairId?'🔗':''}</div>
                            </div>
                        </div>`;
                }
            }
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('badminton_final_tech_data', JSON.stringify(players));
            render();
        }

        function render() {
            document.getElementById('countDisplay').innerText = `[ SYSTEM ACTIVE: 載入 ${players.length} 位 ]`;
            const body = document.getElementById('rankingBody');
            let sorted = [...players].sort((a, b) => b.level - a.level || b.wins - a.wins);
            body.innerHTML = sorted.map(p => `
                <tr>
                    <td style="font-weight:bold;">${p.name}${p.pairId?'🔗':''}</td>
                    <td class="lvl-${p.level}" style="font-weight:bold;">${lvlNames[p.level]}</td>
                    <td>${p.playCount}</td>
                    <td class="neon-text">${p.wins}</td>
                    <td><button onclick="addWin('${p.name}')" style="padding: 6px 10px; font-size:12px; background:rgba(0,242,255,0.2); border:1px solid var(--neon-blue); color:var(--neon-blue);">勝</button></td>
                </tr>`).join('');
        }

        function addWin(n) { players.find(p => p.name === n).wins++; saveAndRender(); }
        function clearData() { if(confirm("確定重置數據？")) { players = []; saveAndRender(); } }
    </script>
</body>
</html>
